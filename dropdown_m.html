<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const select = document.querySelector('select')
            // 수정: addEventListener가 아니라 querySelector로 <p> 태그를 찾아야 합니다.
            const p = document.querySelector('p')

            select.addEventListener('change', (event) => {
                const options = event.currentTarget.options
                const list = []
                
                for (const option of options) {
                    if(option.selected) {
                        list.push(option.textContent)
                    }
                }
                // join(', ')을 사용하여 여러 개 선택 시 쉼표로 구분되게 했습니다.
                p.textContent = `선택한 항목 : ${list.join(', ')}`
            })
        })
    </script>
</head>
<body>
    <select multiple>
        <option>미국</option>
        <option>이스라엘</option>
        <option>이란</option>
        <option>북한</option>
        <option>러시아</option>
        <option>중국</option>
        <option>우크라이나</option>
    </select>
    <p>선택한 항목 : </p>
</body>
</html>
