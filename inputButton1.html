<!DOCTYPE html>
<html lang="en">
<head>
        <!--이메일 변경에 의한 테스트 커밋-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        document.addEventListener('DOMContentLoad', () => {
            const buttonA = document.querySelector('button')
            const buttonB = document.querySelector('input[type=button]')

            buttonA.addEventListener('click', (event) => {
                event.currentTarget.textContent += '추가'
            })
            buttonB.addEventListener('click', (event) => {
                event.currentTarget.value += '추가'
            })
        })
    </script>
    <button>버튼</button>
    <input type="button" value="인폿">
</body>
</html>
